name: Release

on:
  release:
    types: [published]

jobs:
  validate-version:
    name: Validate manifest version matches tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check manifest version matches release tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('custom_components/antminer/manifest.json'))['version'])")
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "ERROR: Release tag '$TAG' does not match manifest.json version '$MANIFEST_VERSION'"
            exit 1
          fi
          echo "Version check passed: $MANIFEST_VERSION"
